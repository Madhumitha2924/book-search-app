<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Folio — Book Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Instrument+Sans:wght@300;400;500&family=Instrument+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f7f2e8;
      --cream2: #efe9d8;
      --cream3: #e5dcc8;
      --ink: #1c1a14;
      --ink2: #2e2b21;
      --forest: #2d4a35;
      --forest2: #3d6347;
      --forest3: #4e7a59;
      --rust: #a0421d;
      --rust2: #c05525;
      --muted: #8a8070;
      --muted2: #b0a898;
      --border: rgba(28,26,20,0.1);
      --border2: rgba(28,26,20,0.18);
      --shadow: 0 2px 20px rgba(28,26,20,0.08);
      --shadow2: 0 8px 40px rgba(28,26,20,0.14);
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Instrument Sans', sans-serif;
      --font-mono: 'Instrument Mono', monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Paper texture lines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 27px,
        rgba(28,26,20,0.04) 27px,
        rgba(28,26,20,0.04) 28px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,242,232,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border2);
      padding: 0 3rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo {
      display: flex; align-items: baseline; gap: 10px;
    }
    .logo-name {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 600;
      font-style: italic;
      color: var(--forest);
      letter-spacing: 0.02em;
    }
    .logo-tagline {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .header-shelf {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 6px;
    }
    .shelf-count {
      background: var(--forest);
      color: var(--cream);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
    }

    /* ── HERO ── */
    .hero {
      padding: 4.5rem 3rem 2.5rem;
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }
    .hero-rule {
      width: 60px; height: 2px;
      background: var(--forest);
      margin: 0 auto 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s forwards;
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--forest3);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(52px, 7vw, 88px);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.3s forwards;
    }
    .hero-title em { color: var(--forest); font-style: italic; }
    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 2.5rem;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s forwards;
    }

    /* ── SEARCH ── */
    .search-wrapper {
      max-width: 620px; margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s forwards;
    }
    .search-outer {
      display: flex;
      border: 1.5px solid var(--forest);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .search-outer:focus-within {
      box-shadow: 0 0 0 3px rgba(45,74,53,0.12);
    }
    #searchInput {
      flex: 1;
      background: transparent;
      border: none; outline: none;
      padding: 14px 20px;
      font-family: var(--font-display);
      font-size: 18px;
      font-style: italic;
      color: var(--ink);
    }
    #searchInput::placeholder { color: var(--muted2); font-style: italic; }
    .search-btn {
      background: var(--forest);
      border: none;
      padding: 0 24px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cream);
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-btn:hover { background: var(--forest2); }

    /* Filter row */
    .filter-row {
      display: flex; justify-content: center; gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.6s 0.6s forwards;
    }
    .filter-chip {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 99px;
      transition: all 0.2s;
    }
    .filter-chip.active, .filter-chip:hover {
      background: var(--forest);
      color: var(--cream);
      border-color: var(--forest);
    }

    /* ── MAIN ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 3rem 8rem;
      position: relative; z-index: 1;
    }

    /* Results header */
    .results-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      display: none;
    }
    .results-info {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .results-info strong { color: var(--forest); }
    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      transition: all 0.15s;
    }
    .view-btn.active { background: var(--forest); color: var(--cream); border-color: var(--forest); }

    /* ── BOOK GRID ── */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }
    .books-grid.list-view {
      grid-template-columns: 1fr;
      gap: 0;
    }

    /* Card — grid mode */
    .book-card {
      cursor: pointer;
      animation: fadeIn 0.35s ease both;
      position: relative;
    }
    .book-card:hover .card-cover-wrap { transform: translateY(-4px); box-shadow: var(--shadow2); }
    .book-card:hover .card-read-btn { opacity: 1; }

    .card-cover-wrap {
      position: relative;
      margin-bottom: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }
    .card-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }
    .card-no-cover {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px;
      padding: 1rem;
    }
    .no-cover-spine {
      width: 100%; height: 100%;
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      padding: 16px 12px;
    }
    .spine-title {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      color: var(--cream);
    }
    .spine-author {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(247,242,232,0.65);
      text-align: center;
    }

    .card-read-btn {
      position: absolute;
      inset: 0;
      background: rgba(28,26,20,0.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .read-inner {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cream);
      border: 1px solid rgba(247,242,232,0.5);
      padding: 8px 16px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-author {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-year {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted2);
    }

    /* List mode card */
    .books-grid.list-view .book-card {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .books-grid.list-view .card-cover-wrap {
      width: 56px; flex-shrink: 0; margin: 0;
    }
    .books-grid.list-view .card-cover,
    .books-grid.list-view .card-no-cover {
      aspect-ratio: 2/3;
    }
    .books-grid.list-view .card-meta { flex: 1; min-width: 0; }
    .books-grid.list-view .card-title { font-size: 16px; }
    .books-grid.list-view .card-author { font-size: 12px; }
    .books-grid.list-view .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── SKELETON ── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      display: none;
    }
    .skel-card {}
    .skel-cover {
      width: 100%; aspect-ratio: 2/3;
      background: var(--cream3);
      animation: shimmer 1.4s infinite;
      background: linear-gradient(90deg, var(--cream3) 25%, var(--cream2) 50%, var(--cream3) 75%);
      background-size: 200% 100%;
      margin-bottom: 10px;
    }
    .skel-line {
      height: 10px; border-radius: 2px; margin-bottom: 6px;
      background: linear-gradient(90deg, var(--cream3) 25%, var(--cream2) 50%, var(--cream3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    .skel-line.short { width: 60%; }
    .skel-line.tiny { width: 35%; height: 8px; }

    /* ── STATES ── */
    .state-box {
      padding: 6rem 2rem;
      text-align: center;
      display: none;
    }
    .state-box.show { display: block; }
    .state-glyph {
      font-family: var(--font-display);
      font-size: 72px;
      color: var(--muted2);
      font-style: italic;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .state-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .state-sub { font-size: 13px; color: var(--muted2); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(28,26,20,0.7);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--cream);
      border: 1px solid var(--border2);
      max-width: 760px; width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 200px 1fr;
      position: relative;
      transform: translateY(16px);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: var(--cream3); }

    .modal-cover-col {
      background: var(--forest);
      display: flex; align-items: flex-start;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .modal-cover {
      width: 100%;
      box-shadow: 4px 8px 24px rgba(0,0,0,0.3);
      display: block;
    }
    .modal-no-cover {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--forest2);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-no-cover-text {
      font-family: var(--font-display);
      font-size: 48px;
      font-style: italic;
      color: rgba(247,242,232,0.2);
    }

    .modal-body { padding: 2rem 2rem 2rem 1.75rem; }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: transparent;
      border: 1px solid var(--border2);
      width: 30px; height: 30px;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }

    .modal-cats {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 1rem;
    }
    .modal-cat {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 9px;
      border: 1px solid var(--forest3);
      color: var(--forest);
      border-radius: 99px;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 600;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-family: var(--font-display);
      font-size: 18px;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .modal-author {
      font-size: 13px;
      color: var(--forest);
      font-weight: 500;
      margin-bottom: 0.75rem;
    }
    .modal-meta-row {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 1.25rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .meta-pill {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 4px;
    }
    .meta-pill strong { color: var(--ink); }

    .rating-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 1.25rem;
    }
    .stars {
      display: flex; gap: 2px;
    }
    .star { color: var(--rust); font-size: 15px; }
    .star.empty { color: var(--muted2); }
    .rating-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    .modal-desc {
      font-family: var(--font-display);
      font-size: 15px;
      line-height: 1.85;
      color: var(--ink2);
      margin-bottom: 1.5rem;
      border-left: 3px solid var(--forest3);
      padding-left: 14px;
    }

    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-shelf {
      flex: 1;
      background: var(--forest);
      border: none;
      padding: 11px 20px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--cream);
      cursor: pointer;
      transition: background 0.2s;
      min-width: 140px;
    }
    .btn-shelf:hover { background: var(--forest2); }
    .btn-shelf.added {
      background: var(--cream2);
      color: var(--forest);
      border: 1.5px solid var(--forest);
    }
    .btn-preview {
      padding: 11px 18px;
      background: transparent;
      border: 1px solid var(--border2);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-preview:hover { border-color: var(--forest); color: var(--forest); }

    /* ── READING SHELF (bottom bar) ── */
    .shelf-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(247,242,232,0.97);
      backdrop-filter: blur(16px);
      border-top: 1.5px solid var(--border2);
      padding: 10px 3rem;
      display: flex; align-items: center; gap: 16px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .shelf-bar.show { transform: translateY(0); }
    .shelf-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--forest);
      white-space: nowrap;
      border-right: 1px solid var(--border2);
      padding-right: 16px;
    }
    .shelf-chips {
      display: flex; gap: 8px; overflow-x: auto; flex: 1;
      scrollbar-width: none;
    }
    .shelf-chips::-webkit-scrollbar { display: none; }
    .shelf-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--cream2);
      border: 1px solid var(--border2);
      padding: 5px 10px;
      font-size: 12px;
      color: var(--ink2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .shelf-chip img {
      width: 18px; height: 26px; object-fit: cover;
    }
    .chip-del {
      background: none; border: none;
      color: var(--muted2); cursor: pointer;
      font-size: 13px; line-height: 1; padding: 0;
      transition: color 0.15s;
    }
    .chip-del:hover { color: var(--rust); }
    .shelf-clear {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border2);
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .shelf-clear:hover { color: var(--rust); border-color: var(--rust); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 0 1.25rem; }
      .hero { padding: 3rem 1.25rem 2rem; }
      main { padding: 2rem 1.25rem 8rem; }
      .modal { grid-template-columns: 1fr; }
      .modal-cover-col { padding: 1.5rem; }
      .modal-cover { width: 120px; margin: 0 auto; }
      .shelf-bar { padding: 10px 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <span class="logo-name">Folio</span>
      <span class="logo-tagline">Book Search</span>
    </div>
    <div class="header-shelf">
      Reading shelf
      <span class="shelf-count" id="shelfCount">0</span>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-rule"></div>
    <h1 class="hero-title">Find Your Next <em>Great Read.</em></h1>
    <p class="hero-sub">Search millions of books by title, author, ISBN, or keyword</p>

    <div class="search-wrapper">
      <div class="search-outer">
        <input type="text" id="searchInput" placeholder="Search by title, author or keyword..."/>
        <button class="search-btn" onclick="doSearch()">Search</button>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('', this)">All</button>
      <button class="filter-chip" onclick="setFilter('fiction', this)">Fiction</button>
      <button class="filter-chip" onclick="setFilter('science', this)">Science</button>
      <button class="filter-chip" onclick="setFilter('history', this)">History</button>
      <button class="filter-chip" onclick="setFilter('self-help', this)">Self Help</button>
      <button class="filter-chip" onclick="setFilter('technology', this)">Technology</button>
      <button class="filter-chip" onclick="setFilter('biography', this)">Biography</button>
    </div>
  </div>

  <!-- MAIN -->
  <main>
    <!-- Skeletons -->
    <div class="skeleton-grid" id="skelGrid"></div>
          <div class="skel-line"></div>
          <div class="skel-line short"></div>
          <div class="skel-line tiny"></div>
        </div>`).join('')}
    </div>

    <!-- Results bar -->
    <!-- Results bar -->
    <div class="results-bar" id="resultsBar">
      <div class="results-info" id="resultsInfo"></div>
      <div class="view-toggle">
        <select id="sortSelect" onchange="doSearch(null, true)" style="margin-right: 10px; padding: 4px; font-family: var(--font-mono); font-size: 11px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; outline: none;">
          <option value="">Sort: Relevance</option>
          <option value="new">Sort: Newest</option>
          <option value="old">Sort: Oldest</option>
        </select>
        <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid view">⊞</button>
        <button class="view-btn" id="listBtn" onclick="setView('list')" title="List view">☰</button>
      </div>
    </div>

    <!-- Books -->
    <div class="books-grid" id="booksGrid"></div>
    
    <div id="loadMoreContainer" style="display: none; text-align: center; margin-top: 2rem;">
      <button class="search-btn" onclick="loadMore()" id="loadMoreBtn" style="padding: 12px 30px; border-radius: 99px;">Load More</button>
    </div>

    <!-- States -->
    <div class="state-box show" id="emptyState">
      <div class="state-glyph">§</div>
      <div class="state-title">A library awaits</div>
    </div>
    <div class="state-box" id="noResultsState">
      <div class="state-glyph">∅</div>
      <div class="state-title">No books found</div>
      <p class="state-sub">Try a different title, author or keyword</p>
    </div>
    <div class="state-box" id="errorState">
      <div class="state-glyph">!</div>
      <div class="state-title" id="errTitle">Error</div>
      <p class="state-sub" id="errSub">Something went wrong. Try again.</p>
    </div>
  </main>

  <!-- READING SHELF BAR -->
  <div class="shelf-bar" id="shelfBar">
    <span class="shelf-label">My Shelf</span>
    <div class="shelf-chips" id="shelfChips"></div>
    <button class="shelf-clear" onclick="clearShelf()">Clear all</button>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="bgClose(event)">
    <div class="modal" id="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modalInner" style="display:contents;"></div>
    </div>
  </div>

  <script>
    /* ── STATE ── */
    let allBooks = [];
    let shelf = JSON.parse(localStorage.getItem('folio_shelf') || '[]');
    let activeFilter = '';
    let currentQuery = '';
    let viewMode = 'grid';
    let currentPage = 1;
    let isLoadingMore = false;

    const API = 'https://openlibrary.org/search.json';
    const COLORS = ['#2d4a35','#3d5c6a','#5a3a2a','#4a3d5c','#5c4a2a','#2a4a4a','#5c3a3a'];

    /* ── SEARCH ── */
    async function doSearch(customQ, reset = true) {
      const rawQ = customQ || document.getElementById('searchInput').value.trim();
      if (!rawQ) return;
      const q = activeFilter && !rawQ.includes(activeFilter) ? `${rawQ} subject:${activeFilter}` : rawQ;
      currentQuery = rawQ;

      if (reset) {
        currentPage = 1;
        allBooks = [];
        showLoading();
      } else {
        isLoadingMore = true;
        const btn = document.getElementById('loadMoreBtn');
        if (btn) btn.textContent = 'Loading...';
      }

      const sortVal = document.getElementById('sortSelect')?.value || '';
      let url = `${API}?q=${encodeURIComponent(q)}&limit=30&page=${currentPage}`;
      if (sortVal) url += `&sort=${sortVal}`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();

        if (!data.docs || data.docs.length === 0) {
          if (reset) showNoResults();
          else {
            document.getElementById('loadMoreContainer').style.display = 'none';
          }
          return;
        }

        if (reset) allBooks = data.docs;
        else allBooks = allBooks.concat(data.docs);

        renderBooks(allBooks, reset);

        // Show load more if there might be more results
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        if (loadMoreContainer) {
          loadMoreContainer.style.display = data.numFound > allBooks.length ? 'block' : 'none';
        }
        
      } catch(e) {
        if (reset) showError('Failed to fetch', 'Check your internet connection or API rate limit.');
      } finally {
        isLoadingMore = false;
        const btn = document.getElementById('loadMoreBtn');
        if (btn) btn.textContent = 'Load More';
      }
    }

    function loadMore() {
      if (isLoadingMore) return;
      currentPage++;
      doSearch(currentQuery, false);
    }

    /* ── RENDER ── */
    function renderBooks(books, reset = true) {
      hideStates();
      const grid = document.getElementById('booksGrid');
      const bar = document.getElementById('resultsBar');
      const info = document.getElementById('resultsInfo');

      bar.style.display = 'flex';
      info.innerHTML = `<strong>${books.length}</strong> books for "<strong>${currentQuery}</strong>"`;

      const html = books.map((b, i) => {
        const title = b.title || 'Untitled';
        const authors = (b.author_name || ['Unknown']).join(', ');
        const year = b.first_publish_year || '';
        const cover = b.cover_i ? `https://covers.openlibrary.org/b/id/${b.cover_i}-M.jpg` : '';
        const desc = ''; // Open library search doesn't return description
        const color = COLORS[i % COLORS.length];

        const coverHTML = cover
          ? `<img class="card-cover" src="${cover}" alt="${escHtml(title)}" loading="lazy"/>`
          : `<div class="card-no-cover" style="background:${color}; position:relative; aspect-ratio:2/3;">
               <div class="no-cover-spine">
                 <div class="spine-title">${escHtml(title)}</div>
                 <div class="spine-author">${escHtml(authors.split(',')[0])}</div>
               </div>
             </div>`;

        const listDesc = viewMode === 'list'
          ? `<div class="card-desc">${escHtml(desc)}${desc.length >= 100 ? '…' : ''}</div>` : '';

        return `
          <div class="book-card" style="animation-delay:${(i % 30) * 0.03}s" onclick="openModal('${b.key}')">
            <div class="card-cover-wrap">
              ${coverHTML}
              <div class="card-read-btn"><div class="read-inner">View Details</div></div>
            </div>
            <div class="card-meta">
              <div class="card-title">${escHtml(title)}</div>
              <div class="card-author">${escHtml(authors)}</div>
              <div class="card-year">${year}</div>
              ${listDesc}
            </div>
          </div>`;
      }).join('');

      if (reset) grid.innerHTML = html;
      else grid.innerHTML = html; // Because we rebuild html from allBooks
    }

    /* ── VIEW TOGGLE ── */
    function setView(mode) {
      viewMode = mode;
      const grid = document.getElementById('booksGrid');
      grid.className = 'books-grid' + (mode === 'list' ? ' list-view' : '');
      document.getElementById('gridBtn').classList.toggle('active', mode === 'grid');
      document.getElementById('listBtn').classList.toggle('active', mode === 'list');
      if (allBooks.length) renderBooks(allBooks, true);
    }

    /* ── FILTER ── */
    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const q = document.getElementById('searchInput').value.trim();
      if (q) doSearch();
    }

    /* ── MODAL ── */
    async function openModal(bookKey) {
      const overlay = document.getElementById('modalOverlay');
      const inner = document.getElementById('modalInner');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      inner.innerHTML = `<div style="grid-column:1/-1; padding:3rem; font-family:var(--font-display); font-style:italic; color:var(--muted); font-size:18px;">Loading…</div>`;

      try {
        const res = await fetch(`https://openlibrary.org${bookKey}.json`);
        const b = await res.json();

        const searchBook = allBooks.find(book => book.key === bookKey) || {};
        
        const title = b.title || searchBook.title || 'Untitled';
        const subtitle = b.subtitle || '';
        
        let authors = 'Unknown author';
        if (searchBook.author_name && searchBook.author_name.length > 0) {
          authors = searchBook.author_name.join(', ');
        }
        
        const cover = b.covers && b.covers.length > 0 
           ? `https://covers.openlibrary.org/b/id/${b.covers[0]}-M.jpg` 
           : (searchBook.cover_i ? `https://covers.openlibrary.org/b/id/${searchBook.cover_i}-M.jpg` : '');
           
        let desc = 'No description available.';
        if (b.description) {
           desc = typeof b.description === 'string' ? b.description : (b.description.value || desc);
        }
        
        const pages = b.number_of_pages || '';
        const year = b.first_publish_date || searchBook.first_publish_year || '';
        const publisher = b.publishers ? b.publishers.join(', ') : '';
        const cats = b.subjects ? b.subjects.slice(0, 3) : [];
        const previewLink = `https://openlibrary.org${bookKey}`;
        const cleanDesc = desc.replace(/<[^>]+>/g,'').slice(0, 500);

        const inShelf = shelf.some(s => s.id === bookKey);
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];

        inner.innerHTML = `
          <div class="modal-cover-col">
            ${cover
              ? `<img class="modal-cover" src="${cover}" alt="${escHtml(title)}"/>`
              : `<div class="modal-no-cover" style="background:${color}"><div class="modal-no-cover-text">${escHtml(title.slice(0,2))}</div></div>`
            }
          </div>
          <div class="modal-body">
            ${cats.length ? `<div class="modal-cats">${cats.map(c => `<span class="modal-cat">${c}</span>`).join('')}</div>` : ''}
            <h2 class="modal-title">${escHtml(title)}</h2>
            ${subtitle ? `<div class="modal-subtitle">${escHtml(subtitle)}</div>` : ''}
            <div class="modal-author">by ${escHtml(authors)}</div>

            <div class="modal-meta-row">
              ${year ? `<span class="meta-pill"><strong>${year}</strong></span>` : ''}
              ${pages ? `<span class="meta-pill"><strong>${pages}</strong> pages</span>` : ''}
              ${publisher ? `<span class="meta-pill">${escHtml(publisher)}</span>` : ''}
            </div>

            <p class="modal-desc">${escHtml(cleanDesc)}${cleanDesc.length >= 500 ? '…' : ''}</p>

            <div class="modal-actions">
              <button class="btn-shelf ${inShelf ? 'added' : ''}" id="shelfBtn"
                onclick="toggleShelf('${bookKey}', '${escAttr(title)}', '${cover}')">
                ${inShelf ? '✓ On My Shelf' : '+ Add to Shelf'}
              </button>
              ${previewLink ? `<a class="btn-preview" href="${previewLink}" target="_blank">View on OpenLibrary ↗</a>` : ''}
            </div>
          </div>
        `;
      } catch(e) {
        inner.innerHTML = `<div style="grid-column:1/-1; padding:3rem; color:var(--muted);">Failed to load book details.</div>`;
      }
    }

    function bgClose(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ── SHELF ── */
    function toggleShelf(id, title, cover) {
      const idx = shelf.findIndex(s => s.id === id);
      if (idx === -1) shelf.push({ id, title, cover });
      else shelf.splice(idx, 1);
      localStorage.setItem('folio_shelf', JSON.stringify(shelf));
      updateShelfUI();
      const btn = document.getElementById('shelfBtn');
      if (btn) {
        const on = shelf.some(s => s.id === id);
        btn.textContent = on ? '✓ On My Shelf' : '+ Add to Shelf';
        btn.className = 'btn-shelf' + (on ? ' added' : '');
      }
    }

    function clearShelf() {
      shelf = [];
      localStorage.setItem('folio_shelf', JSON.stringify(shelf));
      updateShelfUI();
    }

    function removeFromShelf(id) {
      shelf = shelf.filter(s => s.id !== id);
      localStorage.setItem('folio_shelf', JSON.stringify(shelf));
      updateShelfUI();
    }

    function updateShelfUI() {
      const bar = document.getElementById('shelfBar');
      const chips = document.getElementById('shelfChips');
      const count = document.getElementById('shelfCount');
      count.textContent = shelf.length;
      bar.classList.toggle('show', shelf.length > 0);
      chips.innerHTML = shelf.map(s => `
        <div class="shelf-chip">
          ${s.cover ? `<img src="${s.cover}" alt="${escHtml(s.title)}"/>` : '📖'}
          <span>${escHtml(s.title.slice(0,30))}${s.title.length > 30 ? '…' : ''}</span>
          <button class="chip-del" onclick="removeFromShelf('${s.id}')">✕</button>
        </div>`).join('');
    }

    /* ── UI UTILS ── */
    function showLoading() {
      hideStates();
      const loadMoreContainer = document.getElementById('loadMoreContainer');
      if (loadMoreContainer) loadMoreContainer.style.display = 'none';
      
      const skelGrid = document.getElementById('skelGrid');
      skelGrid.style.display = 'grid';
      skelGrid.innerHTML = Array(10).fill(`
        <div class="skel-card">
          <div class="skel-cover"></div>
          <div class="skel-line"></div>
          <div class="skel-line short"></div>
          <div class="skel-line tiny"></div>
        </div>`).join('');
        
      document.getElementById('booksGrid').innerHTML = '';
      document.getElementById('resultsBar').style.display = 'none';
    }
    function showNoResults() {
      hideStates();
      document.getElementById('noResultsState').classList.add('show');
    }
    function showError(title, sub) {
      hideStates();
      document.getElementById('errTitle').textContent = title;
      document.getElementById('errSub').textContent = sub;
      document.getElementById('errorState').classList.add('show');
    }
    function hideStates() {
      document.getElementById('skelGrid').style.display = 'none';
      ['emptyState','noResultsState','errorState'].forEach(id =>
        document.getElementById(id).classList.remove('show'));
    }
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escAttr(str) {
      return String(str).replace(/'/g,"\\'").replace(/"/g,'&quot;');
    }

    /* ── KEYBOARD ── */
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    /* ── INIT ── */
    updateShelfUI();

  </script>
</body>
</html>
